services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    expose:
      - "80"
    environment:
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_API_BASE=/api
      - VITE_WS_BASE=/ws
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "5000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - JWT_SECRET=${JWT_KEY}
      - EXEC_TIMEOUT_S=${EXEC_TIMEOUT_S:-10}
      - COMPILE_TIMEOUT_S=${COMPILE_TIMEOUT_S:-15}
      - MAX_CODE_KB=${MAX_CODE_KB:-64}
      - SANDBOX_IMAGE=simples-runner:latest
      - STOP_TIMEOUT_S=${STOP_TIMEOUT_S:-12}
      - RUNS_PER_MINUTE=${RUNS_PER_MINUTE:-30}
      - RUNS_PER_MINUTE_IP=${RUNS_PER_MINUTE_IP:-120}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - runner_image_build
      - redis
    restart: unless-stopped

  runner_image_build:
    image: simples-runner:latest
    build:
      context: ./runner
      dockerfile: Dockerfile
    command: ["true"]
    restart: "no"
